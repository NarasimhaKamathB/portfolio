<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ORCID Authorization</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
    .code-box { background: #f0f4f8; border: 2px solid #a6ce39; border-radius: 8px;
                padding: 20px; margin: 20px 0; word-break: break-all; font-size: 1.1em; }
    .label { color: #555; font-size: 0.9em; margin-bottom: 8px; }
    button { background: #a6ce39; border: none; padding: 10px 20px; border-radius: 6px;
             cursor: pointer; font-size: 1em; }
    button:active { opacity: 0.7; }
    .error { color: #c0392b; }
  </style>
</head>
<body>
  <h2>ORCID Authorization Code</h2>
  <div id="content"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code  = params.get('code');
    const error = params.get('error');
    const div   = document.getElementById('content');

    if (error) {
      div.innerHTML = `<p class="error">Authorization failed: <strong>${error}</strong></p>
                       <p>${params.get('error_description') || ''}</p>`;
    } else if (code) {
      div.innerHTML = `
        <p>Authorization successful. Copy the code below and paste it into the terminal.</p>
        <div class="label">Authorization code:</div>
        <div class="code-box" id="code">${code}</div>
        <button onclick="navigator.clipboard.writeText('${code}').then(()=>this.textContent='Copied!')">
          Copy to clipboard
        </button>`;
    } else {
      div.innerHTML = `<p class="error">No authorization code found in the URL.</p>`;
    }
  </script>
</body>
</html>
